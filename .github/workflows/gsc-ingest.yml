name: GSC bi-weekly ingest

on:
  schedule:
    - cron: '0 10 1,15 * *' # 1st and 15th of each month, 10:00 UTC (after ~2-day GSC lag)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run GSC ingest
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GSC_SERVICE_ACCOUNT_CREDENTIALS }}
        run: node scripts/ingest-gsc-performance.mjs
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(gsc): bi-weekly performance ingest'
          branch: gsc/biweekly-ingest
          title: 'GSC performance ingest'
          body: |
            Automated bi-weekly GSC ingest. Review the dated digest under `docs/blog-migration/`
            and the regenerated registry at `content/_registry/gsc-performance.json` before
            merging. The gitignored raw API dump under `docs/blog-migration/raw/` is not
            committed — pull the GHA run logs if you need to inspect raw rows.
          add-paths: |
            content/_registry/gsc-performance.json
            docs/blog-migration/gsc-performance-*.md
